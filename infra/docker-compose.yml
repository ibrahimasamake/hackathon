version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: farmers-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmers_db
      POSTGRES_USER: farmers
      POSTGRES_PASSWORD: farmers
    ports:
      - "5432:5432"
    volumes:
      - farmers_postgres_data:/var/lib/postgresql/data

volumes:
  farmers_postgres_data:
